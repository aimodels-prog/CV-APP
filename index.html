<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#075b9c" />
    <meta name="application-name" content="VIA CV Tool" />
    <meta name="description" content="VIA International's expert CV, tender matching and document generation platform." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="VIA International" />
    <meta property="og:title" content="VIA CV Tool" />
    <meta property="og:description" content="Expert CV management, tender matching and professional document generation for VIA International." />
    <meta property="og:url" content="https://cvtool.via-int.com/" />
    <meta property="og:image" content="https://cvtool.via-int.com/via-international-logo.png" />
    <meta property="og:image:alt" content="VIA International" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VIA CV Tool" />
    <meta name="twitter:description" content="Expert CV management, tender matching and professional document generation for VIA International." />
    <meta name="twitter:image" content="https://cvtool.via-int.com/via-international-logo.png" />
    <link rel="icon" type="image/png" href="/via-international-logo.png" />
    <link rel="apple-touch-icon" href="/via-international-logo.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>VIA CV Tool</title>
    <script>
      (() => {
        const refreshParameter = '_asset_refresh';

        window.reloadForMissingAsset = () => {
          const url = new URL(window.location.href);
          if (url.searchParams.has(refreshParameter)) return;
          url.searchParams.set(refreshParameter, Date.now().toString());
          window.location.replace(url.toString());
        };

        window.addEventListener('error', (event) => {
          const target = event.target;
          const missingModule = target instanceof HTMLScriptElement && target.type === 'module';
          const missingStylesheet = target instanceof HTMLLinkElement && target.rel === 'stylesheet';
          if (missingModule || missingStylesheet) window.reloadForMissingAsset();
        }, true);

        window.addEventListener('load', () => {
          const url = new URL(window.location.href);
          if (!url.searchParams.has(refreshParameter)) return;
          url.searchParams.delete(refreshParameter);
          window.history.replaceState({}, '', `${url.pathname}${url.search}${url.hash}`);
        });
      })();
    </script>
  </head>
  <body>
    <script>
      window.addEventListener('error', (e) => {
        if (e.message?.includes('WebSocket') || e.message?.includes('connection')) return;
        document.body.innerHTML += `<div style="position:fixed;top:0;left:0;background:red;color:white;z-index:9999;padding:20px;font-family:monospace"><b>${e.message}</b><pre>${e.error?.stack}</pre></div>`;
      });
      window.addEventListener('unhandledrejection', (e) => {
        const reason = String(e.reason);
        if (reason.includes('WebSocket') || reason.includes('closed without opened')) return;
        document.body.innerHTML += `<div style="position:fixed;top:0;left:0;background:red;color:white;z-index:9999;padding:20px;font-family:monospace"><b>Unhandled Promise: ${e.reason}</b></div>`;
      });
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
